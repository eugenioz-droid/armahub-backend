  <!-- TAB 5: EXPORTACIÓN -->
  <div id="tab-export" class="tab-content">
    <div class="card">
      <h3>Exportar a producción (aSa Studio)</h3>
      <p class="muted" style="margin-bottom:12px;">Genera un ZIP con un archivo Excel por cada combinación SECTOR + PISO + CICLO. Selecciona sectores individualmente o exporta todo.</p>
      <div class="row" style="gap:8px; align-items:flex-end;">
        <div class="col" style="flex:2; position:relative;">
          <label style="font-size:11px; color:#666; font-weight:600;">Proyecto *</label>
          <div style="position:relative;">
            <span style="position:absolute; left:8px; top:50%; transform:translateY(-50%); font-size:14px; color:#999; pointer-events:none;">🔍</span>
            <input type="text" id="exportProyectoSearch" placeholder="Buscar proyecto..." oninput="filterProjectSelect('exportProyectoSearch','exportProyecto')" style="padding-left:30px; width:100%; font-size:13px; margin-bottom:4px;" />
          </div>
          <select id="exportProyecto" onchange="previewExport()">
            <option value="">-- Selecciona proyecto --</option>
          </select>
        </div>
      </div>
      <div id="exportPreview" style="margin-top:16px;"></div>
    </div>

    <!-- Matriz de exportación -->
    <div class="card" id="exportMatrizCard" style="display:none;">
      <div class="row" style="justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:12px;">
        <h3 style="margin:0;">Matriz de exportación</h3>
        <div class="row" style="gap:6px; align-items:center;">
          <span class="muted" id="exportSelCount" style="font-size:12px;"></span>
          <button onclick="exportSelectAll(true)" class="secondary" style="font-size:11px; padding:4px 10px;">Seleccionar todo</button>
          <button onclick="exportSelectAll(false)" class="secondary" style="font-size:11px; padding:4px 10px;">Deseleccionar</button>
        </div>
      </div>
      <div id="exportMatrizContainer" style="overflow-x:auto;"></div>
      <div class="row" style="gap:10px; margin-top:14px; align-items:center; flex-wrap:wrap;">
        <button onclick="descargarExportSeleccionados()" id="exportSelBtn" style="font-size:13px; padding:8px 20px;" disabled>Exportar seleccionados (0)</button>
        <button onclick="descargarExport()" style="font-size:13px; padding:8px 20px;">Exportar TODO</button>
      </div>
      <div id="exportStatus" class="muted" style="margin-top:8px;"></div>
    </div>

    <!-- Reporte de exportación -->
    <div class="card" id="exportReportCard" style="display:none;">
      <h3 style="margin:0 0 10px 0;">Reporte de exportación</h3>
      <div id="exportReportContainer"></div>
    </div>
  </div>
