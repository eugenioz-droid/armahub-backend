  <!-- TAB 2: BAR MANAGER -->
  <div id="tab-buscar" class="tab-content">
    <div class="card">
      <h3>Bar Manager</h3>
      <div class="row" style="gap:8px; align-items:flex-end;">
        <div class="col" style="position:relative; flex:2;">
          <label style="font-size:11px; color:#666; font-weight:600;">Proyecto *</label>
          <div style="position:relative;">
            <span style="position:absolute; left:8px; top:50%; transform:translateY(-50%); font-size:14px; color:#999; pointer-events:none;">🔍</span>
            <input type="text" id="proyectoSearchInput" placeholder="Buscar proyecto..." oninput="filterProjectSelect('proyectoSearchInput','proyecto')" style="padding-left:30px; width:100%; font-size:13px; margin-bottom:4px;" />
          </div>
          <select id="proyecto" onchange="onProyectoChange()">
            <option value="">-- Selecciona proyecto --</option>
          </select>
        </div>
        <div class="col">
          <label style="font-size:11px; color:#666;">Plano</label>
          <select id="plano" onchange="onFilterChange()">
            <option value="">Todos</option>
          </select>
        </div>
        <div class="col">
          <label style="font-size:11px; color:#666;">Sector</label>
          <select id="sector" onchange="onFilterChange()">
            <option value="">Todos</option>
          </select>
        </div>
        <div class="col">
          <label style="font-size:11px; color:#666;">Piso</label>
          <select id="piso" onchange="onFilterChange()">
            <option value="">Todos</option>
          </select>
        </div>
        <div class="col">
          <label style="font-size:11px; color:#666;">Ciclo</label>
          <select id="ciclo" onchange="onFilterChange()">
            <option value="">Todos</option>
          </select>
        </div>
      </div>

      <!-- Carga filter row -->
      <div class="row" style="gap:8px; margin-top:8px; align-items:flex-end;">
        <div class="col" style="flex:2;">
          <label style="font-size:11px; color:#666;">Carga</label>
          <select id="filtroCarga" onchange="onCargaFilterChange()" style="font-size:12px;">
            <option value="">Todas las cargas</option>
          </select>
        </div>
        <div class="col" style="flex:3;">
          <input id="q" placeholder="Buscar por ID, Eje..." onkeyup="if(event.key==='Enter') buscar(true)" style="font-size:13px;" />
        </div>
        <div class="col">
          <select id="order_by" onchange="buscar(true)" style="font-size:12px;">
            <option value="sector">Orden: Sector</option>
            <option value="piso">Orden: Piso</option>
            <option value="ciclo">Orden: Ciclo</option>
            <option value="eje">Orden: Eje</option>
            <option value="diam">Orden: φ</option>
            <option value="peso_total">Orden: Peso</option>
            <option value="cant_total">Orden: Cantidad</option>
            <option value="largo_total">Orden: Largo</option>
            <option value="id_unico">Orden: ID</option>
          </select>
        </div>
        <div class="col" style="flex:0;">
          <select id="order_dir" onchange="buscar(true)" style="font-size:12px;">
            <option value="asc">ASC</option>
            <option value="desc">DESC</option>
          </select>
        </div>
        <div class="col" style="flex:0;">
          <select id="filtroOrigen" onchange="buscar(true)" style="font-size:12px;">
            <option value="">Origen: Todos</option>
            <option value="csv">CSV</option>
            <option value="manual">Manual</option>
            <option value="pedido">Pedido</option>
          </select>
        </div>
        <button onclick="buscar(true)" style="font-size:12px; padding:6px 14px;">🔍 Buscar</button>
        <button class="secondary" onclick="resetFiltros()" style="font-size:12px; padding:6px 14px;">Limpiar</button>
        <button class="secondary" onclick="toggleCrearBarraForm()" style="font-size:12px; padding:6px 14px; background:#e3f2fd; border-color:#1565C0; color:#1565C0;">+ Crear barra</button>
      </div>
      <!-- Active carga filter badge (for navigation from Obras) -->
      <div id="cargaFilterBadge" style="display:none; margin-top:8px; padding:6px 12px; background:#e3f2fd; border:1px solid #90CAF9; border-radius:6px; font-size:12px;">
        📦 Filtrando por carga: <strong id="cargaFilterLabel"></strong>
        <button class="secondary" style="font-size:10px; padding:1px 8px; margin-left:8px;" onclick="clearCargaFilter()">✕ Quitar filtro</button>
      </div>
    </div>

    <!-- FORMULARIO CREAR BARRA MANUAL -->
    <div id="crearBarraCard" class="card" style="display:none; border-top:3px solid #1565C0;">
      <h4 style="margin:0 0 8px 0; color:#1565C0;">Crear barra manual</h4>
      <div class="row" style="gap:8px; flex-wrap:wrap; align-items:flex-end;">
        <div class="col" style="min-width:180px;">
          <label style="font-size:11px; color:#666;">Proyecto *</label>
          <select id="crearBarraProy" style="font-size:12px; width:100%;"></select>
        </div>
        <div class="col" style="min-width:90px;">
          <label style="font-size:11px; color:#666;">Sector *</label>
          <select id="crearBarraSector" style="font-size:12px;">
            <option value="FUND">FUND</option>
            <option value="ELEV">ELEV</option>
            <option value="LCIELO">LCIELO</option>
            <option value="VCIELO">VCIELO</option>
          </select>
        </div>
        <div class="col" style="min-width:70px;">
          <label style="font-size:11px; color:#666;">Piso *</label>
          <input type="text" id="crearBarraPiso" placeholder="P01" style="font-size:12px; width:60px;" />
        </div>
        <div class="col" style="min-width:70px;">
          <label style="font-size:11px; color:#666;">Ciclo *</label>
          <input type="text" id="crearBarraCiclo" placeholder="C01" style="font-size:12px; width:60px;" />
        </div>
        <div class="col" style="min-width:100px;">
          <label style="font-size:11px; color:#666;">Eje *</label>
          <input type="text" id="crearBarraEje" placeholder="Eje" maxlength="14" style="font-size:12px; width:90px;" />
        </div>
        <div class="col" style="min-width:60px;">
          <label style="font-size:11px; color:#666;">φ (mm) *</label>
          <input type="number" id="crearBarraDiam" placeholder="12" step="1" min="4" max="50" style="font-size:12px; width:55px;" />
        </div>
        <div class="col" style="min-width:70px;">
          <label style="font-size:11px; color:#666;">Largo (cm) *</label>
          <input type="number" id="crearBarraLargo" placeholder="300" step="1" min="1" style="font-size:12px; width:65px;" />
        </div>
        <div class="col" style="min-width:50px;">
          <label style="font-size:11px; color:#666;">Cant</label>
          <input type="number" id="crearBarraCant" value="1" min="1" step="1" style="font-size:12px; width:45px;" />
        </div>
        <div class="col" style="min-width:70px;">
          <label style="font-size:11px; color:#666;">Figura</label>
          <input type="text" id="crearBarraFigura" placeholder="" style="font-size:12px; width:60px;" />
        </div>
        <div class="col" style="min-width:70px;">
          <label style="font-size:11px; color:#666;">Marca</label>
          <input type="text" id="crearBarraMarca" placeholder="" style="font-size:12px; width:60px;" />
        </div>
      </div>
      <div style="margin-top:8px; display:flex; gap:8px; align-items:center;">
        <button style="font-size:12px; padding:5px 14px; background:#1565C0; border-color:#1565C0;" onclick="crearBarraManual()">Crear barra</button>
        <button class="secondary" style="font-size:12px; padding:5px 14px;" onclick="toggleCrearBarraForm()">Cancelar</button>
        <span id="crearBarraMsg" class="muted" style="font-size:12px;"></span>
      </div>
    </div>

    <!-- TOOLBAR ACCIONES SELECCIONADAS -->
    <div id="barrasToolbar" class="card" style="display:none; background:#f9fff4; border:1px solid #8BC34A; padding:10px 16px;">
      <div class="row" style="gap:10px; align-items:center; flex-wrap:wrap;">
        <strong id="selectedCount" style="font-size:13px;">0 seleccionadas</strong>
        <select id="accionSector" style="font-size:12px; max-width:140px;">
          <option value="">Cambiar sector...</option>
          <option value="FUND">FUND</option>
          <option value="ELEV">ELEV</option>
          <option value="LCIELO">LCIELO</option>
          <option value="VCIELO">VCIELO</option>
        </select>
        <button onclick="accionCambiarSector()" style="font-size:12px; padding:4px 12px;">Cambiar sector</button>
        <button onclick="eliminarBarrasSeleccionadas()" style="font-size:12px; padding:4px 12px; background:#e53935; border-color:#e53935;">Eliminar</button>
        <button class="secondary" onclick="clearSeleccion()" style="font-size:11px; padding:4px 10px;">Deseleccionar</button>
      </div>
    </div>

    <div class="card" style="padding:8px 16px;">
      <div class="muted" id="count" style="margin-bottom:6px;"></div>
      <div style="overflow-x: auto;">
        <table id="tabla" style="font-size:12px; white-space:nowrap;">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="row" style="justify-content: center; margin-top: 12px; gap:8px;">
        <button onclick="prevPage()" style="font-size:12px; padding:4px 14px;">◀ Anterior</button>
        <span class="muted" id="pageInfo" style="font-size:12px;"></span>
        <button onclick="nextPage()" style="font-size:12px; padding:4px 14px;">Siguiente ▶</button>
      </div>
    </div>
  </div>
